name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ENVIRONMENT: development

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: fastapi-boilerplate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify the container runs as a non-root user
        run: |
          USER=$(docker run --rm fastapi-boilerplate:latest whoami)
          echo "Container runs as: $USER"
          if [ "$USER" = "root" ]; then
            echo "Container is running as root — expected a non-root user."
            exit 1
          fi
